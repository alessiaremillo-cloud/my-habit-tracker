<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#0a0a0f">
<title>Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c6fff;
    --accent2: #ff6f9c;
    --green: #4fffb0;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --text2: #8888aa;
    --text3: #4a4a66;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 80px);
  }

  /* HEADER */
  .header {
    padding: 20px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    padding: 14px 8px;
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* PAGES */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* TODAY PAGE */
  .today-greeting {
    margin-bottom: 24px;
  }
  .today-greeting h1 {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.2;
  }
  .today-greeting h1 span { color: var(--accent); }
  .today-greeting p {
    color: var(--text2);
    font-size: 14px;
    margin-top: 6px;
  }

  .progress-ring-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0 28px;
  }
  .progress-ring-container {
    position: relative;
    width: 140px;
    height: 140px;
  }
  .progress-ring-container svg { transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .progress-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .progress-ring-text .pct {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }
  .progress-ring-text .lbl {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* HABIT CARDS */
  .habits-grid { display: flex; flex-direction: column; gap: 12px; }
  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .habit-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--habit-color);
    border-radius: 3px 0 0 3px;
  }
  .habit-card.done {
    border-color: var(--habit-color);
    background: color-mix(in srgb, var(--habit-color) 8%, var(--surface));
  }
  .habit-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: color-mix(in srgb, var(--habit-color) 20%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name {
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
  }
  .habit-streak {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }
  .habit-streak span { color: var(--habit-color); font-weight: 600; }
  .habit-check {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--habit-color);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: var(--habit-color);
  }
  .habit-card.done .habit-check {
    background: var(--habit-color);
    color: var(--bg);
  }

  /* SCORE INPUT MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    padding: 24px 24px calc(24px + var(--safe-bottom));
    width: 100%;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 20px; font-weight: 600;
    margin-bottom: 6px;
  }
  .modal-subtitle {
    font-size: 13px; color: var(--text2);
    margin-bottom: 24px;
  }

  .score-options {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .score-opt {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: none;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .score-opt.selected {
    border-color: var(--habit-color);
    background: color-mix(in srgb, var(--habit-color) 20%, transparent);
    color: var(--habit-color);
  }
  .score-opt:active { transform: scale(0.93); }

  .score-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3);
    margin-bottom: 24px;
    padding: 0 2px;
  }

  .modal-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.cancel {
    background: var(--surface2);
    color: var(--text2);
    margin-top: 10px;
  }

  /* MONTHLY PAGE */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .month-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
  }
  .month-label {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 28px;
  }
  .cal-day-header {
    text-align: center;
    font-size: 10px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    padding: 6px 0;
    text-transform: uppercase;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--text2);
    position: relative;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cal-day.empty { cursor: default; }
  .cal-day.today {
    border: 1px solid var(--accent);
    color: var(--accent);
    font-weight: 700;
  }
  .cal-day.has-data {
    background: var(--surface2);
    color: var(--text);
  }
  .cal-day .day-dot {
    position: absolute;
    bottom: 3px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cal-day.perfect .day-dot { background: var(--green); }
  .cal-day.good .day-dot { background: var(--yellow); }

  /* MONTHLY STATS */
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .habit-month-stats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .hms-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .hms-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .hms-name { font-weight: 600; font-size: 15px; }
  .hms-score {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--habit-color);
  }
  .hms-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .hms-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--habit-color);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .hms-meta {
    display: flex; gap: 12px;
    margin-top: 8px;
    font-size: 11px; color: var(--text2);
  }
  .hms-meta span { color: var(--text); font-weight: 500; }

  /* YEARLY PAGE */
  .yearly-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .ys-stat { }
  .ys-stat .val {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .ys-stat .lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .yearly-heat {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 4px;
    margin-bottom: 28px;
  }
  .yh-month {
    display: flex; flex-direction: column; gap: 3px;
  }
  .yh-month-label {
    font-size: 8px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
    text-align: center;
    margin-bottom: 2px;
    text-transform: uppercase;
  }
  .yh-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--surface2);
  }
  .yh-cell.l1 { background: color-mix(in srgb, var(--accent) 25%, transparent); }
  .yh-cell.l2 { background: color-mix(in srgb, var(--accent) 50%, transparent); }
  .yh-cell.l3 { background: color-mix(in srgb, var(--accent) 75%, transparent); }
  .yh-cell.l4 { background: var(--accent); }

  .yearly-habit-list { display: flex; flex-direction: column; gap: 10px; }
  .yhl-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex; gap: 14px; align-items: center;
  }
  .yhl-icon {
    font-size: 24px;
    width: 44px; height: 44px;
    border-radius: 12px;
    background: color-mix(in srgb, var(--habit-color) 20%, transparent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .yhl-info { flex: 1; }
  .yhl-name { font-weight: 600; font-size: 15px; }
  .yhl-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .yhl-avg {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--habit-color);
    text-align: right;
  }
  .yhl-avg small { font-size: 11px; color: var(--text2); display: block; }

  /* GOALS PAGE */
  .goals-list { display: flex; flex-direction: column; gap: 12px; }
  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .goal-top {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }
  .goal-icon { font-size: 22px; }
  .goal-name { font-weight: 600; font-size: 16px; flex: 1; }
  .goal-edit-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px;
    padding: 6px 10px; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .goal-progress-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .goal-current {
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--text);
  }
  .goal-target { font-size: 13px; color: var(--text2); }
  .goal-bar-bg {
    height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden;
  }
  .goal-bar-fill {
    height: 100%; border-radius: 4px;
    background: var(--habit-color);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .goal-pct { font-size: 12px; color: var(--text2); margin-top: 6px; text-align: right; }

  /* Goal edit modal */
  .goal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 18px;
    font-family: 'Space Mono', monospace;
    text-align: center;
    outline: none;
    margin-bottom: 16px;
  }
  .goal-input:focus { border-color: var(--accent); }

  .empty-state {
    text-align: center;
    color: var(--text3);
    padding: 40px 20px;
    font-size: 14px;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: calc(var(--safe-top) + 60px);
    left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 14px; font-weight: 500;
    color: var(--text);
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Habits</span>
  <span class="header-date" id="headerDate"></span>
</div>

<!-- TODAY PAGE -->
<div class="page active" id="page-today">
  <div class="today-greeting">
    <h1 id="greetingText">Buongiorno, <span>Damiano</span></h1>
    <p id="greetingSubtitle">Nessuna abitudine completata ancora.</p>
  </div>

  <div class="progress-ring-wrap">
    <div class="progress-ring-container">
      <svg viewBox="0 0 140 140" width="140" height="140">
        <circle class="progress-ring-bg" cx="70" cy="70" r="58"/>
        <circle class="progress-ring-fill" id="progressRing" cx="70" cy="70" r="58"
          stroke-dasharray="364.4"
          stroke-dashoffset="364.4"/>
      </svg>
      <div class="progress-ring-text">
        <span class="pct" id="progressPct">0%</span>
        <span class="lbl">oggi</span>
      </div>
    </div>
  </div>

  <div class="habits-grid" id="habitsGrid"></div>
</div>

<!-- MONTHLY PAGE -->
<div class="page" id="page-monthly">
  <div class="month-nav">
    <button class="month-nav-btn" id="prevMonth">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="month-nav-btn" id="nextMonth">›</button>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
  <p class="section-title">Per abitudine</p>
  <div class="habit-month-stats" id="habitMonthStats"></div>
</div>

<!-- YEARLY PAGE -->
<div class="page" id="page-yearly">
  <div class="yearly-summary" id="yearlySummary"></div>
  <p class="section-title">Attività annuale</p>
  <div class="yearly-heat" id="yearlyHeat"></div>
  <p class="section-title">Media per abitudine</p>
  <div class="yearly-habit-list" id="yearlyHabitList"></div>
</div>

<!-- GOALS PAGE -->
<div class="page" id="page-goals">
  <p class="section-title" style="margin-bottom:20px">Obiettivi mensili</p>
  <div class="goals-list" id="goalsList"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-page="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Oggi
  </button>
  <button class="nav-btn" data-page="monthly">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Mese
  </button>
  <button class="nav-btn" data-page="yearly">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Anno
  </button>
  <button class="nav-btn" data-page="goals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    Obiettivi
  </button>
</nav>

<!-- SCORE MODAL -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-subtitle">Quanto ti sei impegnato oggi?</div>
    <div class="score-options" id="scoreOptions"></div>
    <div class="score-labels">
      <span>Niente</span>
      <span>Eccellente</span>
    </div>
    <button class="modal-btn" id="modalSave">Salva</button>
    <button class="modal-btn cancel" id="modalCancel">Annulla</button>
  </div>
</div>

<!-- GOAL EDIT MODAL -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="goalModalTitle"></div>
    <div class="modal-subtitle" style="margin-bottom:20px">Obiettivo mensile (0-100)</div>
    <input type="number" class="goal-input" id="goalInput" min="0" max="100" placeholder="es. 75">
    <button class="modal-btn" id="goalSave">Salva obiettivo</button>
    <button class="modal-btn cancel" id="goalCancel">Annulla</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const HABITS = [
  { id: 'lettura', name: 'Lettura',  icon: '📚', color: '#7c6fff' },
  { id: 'studio',  name: 'Studio',   icon: '🧠', color: '#4fffb0' },
  { id: 'droga',   name: 'Sobrio',   icon: '🧘', color: '#ff6f9c' },
  { id: 'sport',   name: 'Sport',    icon: '🏋️', color: '#ffd166' },
  { id: 'altro',   name: 'Altro',    icon: '✨', color: '#6fc8ff' },
];

// ============================================================
// STORAGE HELPERS
// ============================================================
const KEY_DATA   = 'ht_data_v1';
const KEY_GOALS  = 'ht_goals_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(KEY_DATA)) || {}; }
  catch { return {}; }
}
function saveData(d) { localStorage.setItem(KEY_DATA, JSON.stringify(d)); }

function loadGoals() {
  try { return JSON.parse(localStorage.getItem(KEY_GOALS)) || {}; }
  catch { return {}; }
}
function saveGoals(g) { localStorage.setItem(KEY_GOALS, JSON.stringify(g)); }

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthKey(y, m) {
  return `${y}-${String(m+1).padStart(2,'0')}`;
}
function todayKey() { return dateKey(new Date()); }

// Get or create day entry
function getDayEntry(key) {
  const d = loadData();
  return d[key] || {};
}
function setDayScore(dateK, habitId, score) {
  const d = loadData();
  if (!d[dateK]) d[dateK] = {};
  d[dateK][habitId] = score;
  saveData(d);
}

// ============================================================
// STATE
// ============================================================
let currentPage = 'today';
let viewMonth   = new Date().getMonth();
let viewYear    = new Date().getFullYear();
let modalHabit  = null;
let modalScore  = null;
let goalEditHabit = null;

// ============================================================
// UTILS
// ============================================================
const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                   'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT   = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

function habitById(id) { return HABITS.find(h => h.id === id); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function dayScore(entry) {
  // average of filled habits * 20 => max 100
  const vals = HABITS.map(h => entry[h.id] !== undefined ? entry[h.id] : null).filter(v => v !== null);
  if (!vals.length) return null;
  return Math.round(vals.reduce((a,b) => a+b, 0) / vals.length * 20);
}

function completedCount(entry) {
  return HABITS.filter(h => entry[h.id] !== undefined && entry[h.id] > 0).length;
}

// ============================================================
// HEADER DATE
// ============================================================
function updateHeaderDate() {
  const now = new Date();
  const opts = { weekday: 'short', day: 'numeric', month: 'short' };
  document.getElementById('headerDate').textContent = now.toLocaleDateString('it-IT', opts);
}

// ============================================================
// GREETING
// ============================================================
function updateGreeting() {
  const h = new Date().getHours();
  let g = h < 12 ? 'Buongiorno' : h < 18 ? 'Buon pomeriggio' : 'Buonasera';
  document.getElementById('greetingText').innerHTML = `${g}, <span>Damiano</span>`;

  const entry = getDayEntry(todayKey());
  const done  = completedCount(entry);
  const total = HABITS.length;
  let sub = '';
  if (done === 0) sub = 'Nessuna abitudine completata ancora.';
  else if (done < total) sub = `${done} su ${total} abitudini completate.`;
  else sub = '🎉 Tutte le abitudini completate!';
  document.getElementById('greetingSubtitle').textContent = sub;
}

// ============================================================
// PROGRESS RING
// ============================================================
function updateRing() {
  const entry = getDayEntry(todayKey());
  const done  = completedCount(entry);
  const pct   = Math.round(done / HABITS.length * 100);
  const circ  = 2 * Math.PI * 58;
  const offset = circ - (pct / 100) * circ;
  document.getElementById('progressRing').style.strokeDashoffset = offset;
  document.getElementById('progressPct').textContent = pct + '%';
}

// ============================================================
// TODAY PAGE
// ============================================================
function renderToday() {
  updateGreeting();
  updateRing();

  const entry = getDayEntry(todayKey());
  const data  = loadData();
  const grid  = document.getElementById('habitsGrid');
  grid.innerHTML = '';

  HABITS.forEach(habit => {
    const score  = entry[habit.id];
    const done   = score !== undefined && score > 0;
    // Streak
    let streak = 0;
    let d = new Date(); d.setDate(d.getDate() - 1);
    while (true) {
      const k = dateKey(d);
      const e = data[k] || {};
      if (e[habit.id] !== undefined && e[habit.id] > 0) { streak++; d.setDate(d.getDate()-1); }
      else break;
      if (streak > 365) break;
    }

    const card = document.createElement('div');
    card.className = 'habit-card' + (done ? ' done' : '');
    card.style.setProperty('--habit-color', habit.color);
    card.innerHTML = `
      <div class="habit-icon">${habit.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${habit.name}</div>
        <div class="habit-streak">Streak: <span>${streak}</span> giorni${score !== undefined ? ' · Score: <span>' + (score*20) + '</span>' : ''}</div>
      </div>
      <div class="habit-check">
        ${done ? `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
      </div>`;
    card.addEventListener('click', () => openScoreModal(habit));
    grid.appendChild(card);
  });
}

// ============================================================
// SCORE MODAL
// ============================================================
function openScoreModal(habit) {
  modalHabit = habit;
  const entry = getDayEntry(todayKey());
  modalScore  = entry[habit.id] !== undefined ? entry[habit.id] : null;

  document.getElementById('modalTitle').textContent = habit.icon + ' ' + habit.name;
  const opts = document.getElementById('scoreOptions');
  opts.innerHTML = '';
  for (let i = 0; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.className = 'score-opt' + (modalScore === i ? ' selected' : '');
    btn.textContent = i;
    btn.style.setProperty('--habit-color', habit.color);
    btn.addEventListener('click', () => {
      modalScore = i;
      opts.querySelectorAll('.score-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    opts.appendChild(btn);
  }
  document.getElementById('scoreModal').classList.add('open');
}

document.getElementById('modalSave').addEventListener('click', () => {
  if (modalScore === null) { showToast('Seleziona un punteggio'); return; }
  setDayScore(todayKey(), modalHabit.id, modalScore);
  document.getElementById('scoreModal').classList.remove('open');
  renderToday();
  showToast(modalScore === 0 ? `${modalHabit.name} segnata come non fatta` : `${modalHabit.name} salvata: ${modalScore*20}`);
});
document.getElementById('modalCancel').addEventListener('click', () => {
  document.getElementById('scoreModal').classList.remove('open');
});
document.getElementById('scoreModal').addEventListener('click', e => {
  if (e.target === document.getElementById('scoreModal'))
    document.getElementById('scoreModal').classList.remove('open');
});

// ============================================================
// MONTHLY PAGE
// ============================================================
function renderMonthly() {
  document.getElementById('monthLabel').textContent = `${MONTHS_IT[viewMonth]} ${viewYear}`;
  renderCalendar();
  renderMonthStats();
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  DAYS_IT.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-header';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(viewYear, viewMonth, 1);
  let startDow = firstDay.getDay(); // 0=sun
  startDow = (startDow === 0) ? 6 : startDow - 1; // mon=0

  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const data = loadData();
  const today = new Date();

  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(viewYear, viewMonth, day);
    const k = dateKey(d);
    const entry = data[k] || {};
    const hasData = Object.keys(entry).length > 0;
    const score = hasData ? dayScore(entry) : null;
    const isToday = d.toDateString() === today.toDateString();

    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (hasData) cls += ' has-data';
    if (score !== null) {
      if (score >= 80) cls += ' perfect';
      else if (score >= 50) cls += ' good';
    }

    const el = document.createElement('div');
    el.className = cls;
    el.innerHTML = `${day}${hasData ? '<div class="day-dot"></div>' : ''}`;
    grid.appendChild(el);
  }
}

function renderMonthStats() {
  const container = document.getElementById('habitMonthStats');
  container.innerHTML = '';
  const data = loadData();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  HABITS.forEach(habit => {
    let total = 0, count = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const k = dateKey(new Date(viewYear, viewMonth, d));
      const e = data[k] || {};
      if (e[habit.id] !== undefined) {
        total += e[habit.id];
        count++;
      }
    }
    const avgRaw  = count > 0 ? total / count : 0;
    const avgPct  = Math.round(avgRaw * 20);
    const maxPct  = 100;
    const barW    = Math.min(100, avgPct);

    const row = document.createElement('div');
    row.className = 'hms-row';
    row.style.setProperty('--habit-color', habit.color);
    row.innerHTML = `
      <div class="hms-top">
        <span class="hms-name">${habit.icon} ${habit.name}</span>
        <span class="hms-score">${avgPct}/100</span>
      </div>
      <div class="hms-bar-bg"><div class="hms-bar-fill" style="width:${barW}%"></div></div>
      <div class="hms-meta">Giorni tracciati: <span>${count}</span> &nbsp;·&nbsp; Media: <span>${avgRaw.toFixed(1)}/5</span></div>`;
    container.appendChild(row);
  });
}

document.getElementById('prevMonth').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderMonthly();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderMonthly();
});

// ============================================================
// YEARLY PAGE
// ============================================================
function renderYearly() {
  const data = loadData();
  const year = new Date().getFullYear();

  // Summary
  let totalDays = 0, totalScore = 0, bestStreak = 0, curStreak = 0;
  for (let m = 0; m < 12; m++) {
    for (let d = 1; d <= new Date(year, m+1, 0).getDate(); d++) {
      const k = dateKey(new Date(year, m, d));
      const e = data[k] || {};
      if (Object.keys(e).length > 0) {
        totalDays++;
        totalScore += dayScore(e) || 0;
      }
    }
  }
  // streak (from today backward)
  let sd = new Date(); curStreak = 0;
  while (true) {
    const k = dateKey(sd);
    const e = data[k] || {};
    if (Object.keys(e).length > 0) { curStreak++; sd.setDate(sd.getDate()-1); }
    else break;
    if (curStreak > 365) break;
  }

  const avgScore = totalDays > 0 ? Math.round(totalScore / totalDays) : 0;
  document.getElementById('yearlySummary').innerHTML = `
    <div class="ys-stat"><div class="val">${totalDays}</div><div class="lbl">Giorni tracciati</div></div>
    <div class="ys-stat"><div class="val">${avgScore}</div><div class="lbl">Score medio</div></div>
    <div class="ys-stat"><div class="val">${curStreak}</div><div class="lbl">Streak attuale</div></div>
    <div class="ys-stat"><div class="val">${year}</div><div class="lbl">Anno</div></div>`;

  // Heatmap
  const heat = document.getElementById('yearlyHeat');
  heat.innerHTML = '';
  const MONTHS_SHORT = ['G','F','M','A','M','G','L','A','S','O','N','D'];
  for (let m = 0; m < 12; m++) {
    const col = document.createElement('div');
    col.className = 'yh-month';
    const lbl = document.createElement('div');
    lbl.className = 'yh-month-label';
    lbl.textContent = MONTHS_SHORT[m];
    col.appendChild(lbl);
    const days = new Date(year, m+1, 0).getDate();
    for (let d = 1; d <= Math.min(days, 5); d++) {
      const k = dateKey(new Date(year, m, d));
      const e = data[k] || {};
      const s = dayScore(e);
      const cell = document.createElement('div');
      let cls = 'yh-cell';
      if (s !== null) {
        if (s >= 80) cls += ' l4';
        else if (s >= 60) cls += ' l3';
        else if (s >= 40) cls += ' l2';
        else cls += ' l1';
      }
      cell.className = cls;
      col.appendChild(cell);
    }
    heat.appendChild(col);
  }

  // Per habit yearly avg
  const list = document.getElementById('yearlyHabitList');
  list.innerHTML = '';
  HABITS.forEach(habit => {
    let total = 0, count = 0;
    for (let m = 0; m < 12; m++) {
      for (let d = 1; d <= new Date(year, m+1, 0).getDate(); d++) {
        const k = dateKey(new Date(year, m, d));
        const e = data[k] || {};
        if (e[habit.id] !== undefined) { total += e[habit.id]; count++; }
      }
    }
    const avg = count > 0 ? (total / count).toFixed(1) : '—';
    const avgPct = count > 0 ? Math.round(total / count * 20) : 0;

    const row = document.createElement('div');
    row.className = 'yhl-row';
    row.style.setProperty('--habit-color', habit.color);
    row.innerHTML = `
      <div class="yhl-icon">${habit.icon}</div>
      <div class="yhl-info">
        <div class="yhl-name">${habit.name}</div>
        <div class="yhl-sub">${count} giorni tracciati · ${avgPct}/100</div>
      </div>
      <div class="yhl-avg">${avg}<small>/5 avg</small></div>`;
    list.appendChild(row);
  });
}

// ============================================================
// GOALS PAGE
// ============================================================
function renderGoals() {
  const goals  = loadGoals();
  const data   = loadData();
  const now    = new Date();
  const mk     = monthKey(now.getFullYear(), now.getMonth());
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const list   = document.getElementById('goalsList');
  list.innerHTML = '';

  HABITS.forEach(habit => {
    const goal = goals[`${mk}_${habit.id}`] || 0;
    // current month avg score
    let total = 0, count = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const k = dateKey(new Date(now.getFullYear(), now.getMonth(), d));
      const e = data[k] || {};
      if (e[habit.id] !== undefined) { total += e[habit.id]; count++; }
    }
    const currentAvgPct = count > 0 ? Math.round(total / count * 20) : 0;
    const pct = goal > 0 ? Math.min(100, Math.round(currentAvgPct / goal * 100)) : 0;

    const card = document.createElement('div');
    card.className = 'goal-card';
    card.style.setProperty('--habit-color', habit.color);
    card.innerHTML = `
      <div class="goal-top">
        <span class="goal-icon">${habit.icon}</span>
        <span class="goal-name">${habit.name}</span>
        <button class="goal-edit-btn" data-id="${habit.id}">Modifica</button>
      </div>
      <div class="goal-progress-row">
        <span class="goal-current">${currentAvgPct}</span>
        <span class="goal-target">obiettivo: ${goal > 0 ? goal : '—'}</span>
      </div>
      <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${goal > 0 ? pct : 0}%"></div></div>
      <div class="goal-pct">${goal > 0 ? pct + '% raggiunto' : 'Nessun obiettivo impostato'}</div>`;
    card.querySelector('.goal-edit-btn').addEventListener('click', () => openGoalModal(habit));
    list.appendChild(card);
  });
}

function openGoalModal(habit) {
  goalEditHabit = habit;
  const now = new Date();
  const mk  = monthKey(now.getFullYear(), now.getMonth());
  const goals = loadGoals();
  const cur = goals[`${mk}_${habit.id}`] || '';
  document.getElementById('goalModalTitle').textContent = `${habit.icon} ${habit.name}`;
  document.getElementById('goalInput').value = cur;
  document.getElementById('goalModal').classList.add('open');
}

document.getElementById('goalSave').addEventListener('click', () => {
  const val = parseInt(document.getElementById('goalInput').value);
  if (isNaN(val) || val < 0 || val > 100) { showToast('Inserisci un valore tra 0 e 100'); return; }
  const now = new Date();
  const mk  = monthKey(now.getFullYear(), now.getMonth());
  const goals = loadGoals();
  goals[`${mk}_${goalEditHabit.id}`] = val;
  saveGoals(goals);
  document.getElementById('goalModal').classList.remove('open');
  renderGoals();
  showToast(`Obiettivo ${goalEditHabit.name}: ${val}`);
});
document.getElementById('goalCancel').addEventListener('click', () => {
  document.getElementById('goalModal').classList.remove('open');
});
document.getElementById('goalModal').addEventListener('click', e => {
  if (e.target === document.getElementById('goalModal'))
    document.getElementById('goalModal').classList.remove('open');
});

// ============================================================
// NAVIGATION
// ============================================================
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-' + page).classList.add('active');
    currentPage = page;
    if (page === 'today')   renderToday();
    if (page === 'monthly') renderMonthly();
    if (page === 'yearly')  renderYearly();
    if (page === 'goals')   renderGoals();
  });
});

// ============================================================
// INIT
// ============================================================
updateHeaderDate();
renderToday();
</script>
