<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#0a0a0f">
<title>Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c6fff;
    --green: #4fffb0;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --text2: #8888aa;
    --text3: #4a4a66;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 80px);
  }

  .header {
    padding: 20px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
    background: var(--bg); z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-title { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }
  .header-date  { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding-bottom: var(--safe-bottom); z-index: 100;
  }
  .nav-btn {
    flex: 1; padding: 14px 8px; background: none; border: none;
    color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 11px;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 20px; height: 20px; }

  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  .today-greeting { margin-bottom: 24px; }
  .today-greeting h1 { font-size: 28px; font-weight: 600; line-height: 1.2; }
  .today-greeting h1 span { color: var(--accent); }
  .today-greeting p { color: var(--text2); font-size: 14px; margin-top: 6px; }

  .progress-ring-wrap { display: flex; justify-content: center; margin: 8px 0 28px; }
  .progress-ring-container { position: relative; width: 140px; height: 140px; }
  .progress-ring-container svg { transform: rotate(-90deg); }
  .progress-ring-bg   { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .progress-ring-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1); }
  .progress-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .progress-ring-text .pct { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }
  .progress-ring-text .lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }

  .habits-grid { display: flex; flex-direction: column; gap: 12px; }
  .habit-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden; user-select: none;
  }
  .habit-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--habit-color); border-radius: 3px 0 0 3px;
  }
  .habit-card.done {
    border-color: var(--habit-color);
    background: color-mix(in srgb, var(--habit-color) 8%, var(--surface));
  }
  .habit-icon { width: 44px; height: 44px; border-radius: 12px; background: color-mix(in srgb, var(--habit-color) 20%, transparent); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name { font-weight: 600; font-size: 16px; }
  .habit-streak { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .habit-streak span { color: var(--habit-color); font-weight: 600; }
  .habit-check {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--habit-color);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; color: var(--habit-color);
  }
  .habit-card.done .habit-check { background: var(--habit-color); color: var(--bg); }

  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .month-nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
  .month-label { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--text); text-transform: uppercase; letter-spacing: 0.05em; }

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 28px; }
  .cal-day-header { text-align: center; font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; padding: 6px 0; text-transform: uppercase; }
  .cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text2); position: relative; }
  .cal-day.today { border: 1px solid var(--accent); color: var(--accent); font-weight: 700; }
  .cal-day.has-data { background: var(--surface2); color: var(--text); }
  .cal-day .day-dot { position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .cal-day.perfect .day-dot { background: var(--green); }
  .cal-day.partial .day-dot { background: var(--yellow); }

  .section-title { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }

  .habit-month-stats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .hms-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .hms-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hms-name { font-weight: 600; font-size: 15px; }
  .hms-score { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--habit-color); }
  .hms-bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .hms-bar-fill { height: 100%; border-radius: 3px; background: var(--habit-color); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .hms-meta { margin-top: 8px; font-size: 11px; color: var(--text2); }
  .hms-meta span { color: var(--text); font-weight: 500; }

  .yearly-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ys-stat .val { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: var(--accent); }
  .ys-stat .lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .yearly-heat { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; margin-bottom: 28px; }
  .yh-month { display: flex; flex-direction: column; gap: 3px; }
  .yh-month-label { font-size: 8px; color: var(--text3); font-family: 'Space Mono', monospace; text-align: center; margin-bottom: 2px; text-transform: uppercase; }
  .yh-cell { aspect-ratio: 1; border-radius: 3px; background: var(--surface2); }
  .yh-cell.l1 { background: color-mix(in srgb, var(--accent) 25%, transparent); }
  .yh-cell.l2 { background: color-mix(in srgb, var(--accent) 50%, transparent); }
  .yh-cell.l3 { background: color-mix(in srgb, var(--accent) 75%, transparent); }
  .yh-cell.l4 { background: var(--accent); }

  .yearly-habit-list { display: flex; flex-direction: column; gap: 10px; }
  .yhl-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 14px; align-items: center; }
  .yhl-icon { font-size: 24px; width: 44px; height: 44px; border-radius: 12px; background: color-mix(in srgb, var(--habit-color) 20%, transparent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .yhl-info { flex: 1; }
  .yhl-name { font-weight: 600; font-size: 15px; }
  .yhl-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .yhl-pts { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--habit-color); text-align: right; }
  .yhl-pts small { font-size: 11px; color: var(--text2); display: block; }

  .goals-list { display: flex; flex-direction: column; gap: 12px; }
  .goal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .goal-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .goal-icon { font-size: 22px; }
  .goal-name { font-weight: 600; font-size: 16px; flex: 1; }
  .goal-edit-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .goal-progress-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .goal-current { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; }
  .goal-target { font-size: 13px; color: var(--text2); }
  .goal-bar-bg { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .goal-bar-fill { height: 100%; border-radius: 4px; background: var(--habit-color); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .goal-pct { font-size: 12px; color: var(--text2); margin-top: 6px; text-align: right; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; border-top: 1px solid var(--border); padding: 24px 24px calc(24px + var(--safe-bottom)); width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .modal-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .goal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-size: 24px; font-family: 'Space Mono', monospace; text-align: center; outline: none; margin-bottom: 16px; }
  .goal-input:focus { border-color: var(--accent); }
  .modal-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: white; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.cancel { background: var(--surface2); color: var(--text2); margin-top: 10px; }

  .toast { position: fixed; top: calc(var(--safe-top) + 60px); left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--text); z-index: 300; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Habits</span>
  <span class="header-date" id="headerDate"></span>
</div>

<div class="page active" id="page-today">
  <div class="today-greeting">
    <h1 id="greetingText">Buongiorno, <span>Damiano</span></h1>
    <p id="greetingSubtitle"></p>
  </div>
  <div class="progress-ring-wrap">
    <div class="progress-ring-container">
      <svg viewBox="0 0 140 140" width="140" height="140">
        <circle class="progress-ring-bg" cx="70" cy="70" r="58"/>
        <circle class="progress-ring-fill" id="progressRing" cx="70" cy="70" r="58" stroke-dasharray="364.4" stroke-dashoffset="364.4"/>
      </svg>
      <div class="progress-ring-text">
        <span class="pct" id="progressPct">0/5</span>
        <span class="lbl">oggi</span>
      </div>
    </div>
  </div>
  <div class="habits-grid" id="habitsGrid"></div>
</div>

<div class="page" id="page-monthly">
  <div class="month-nav">
    <button class="month-nav-btn" id="prevMonth">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="month-nav-btn" id="nextMonth">›</button>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
  <p class="section-title">Punti per abitudine</p>
  <div class="habit-month-stats" id="habitMonthStats"></div>
</div>

<div class="page" id="page-yearly">
  <div class="yearly-summary" id="yearlySummary"></div>
  <p class="section-title">Attività annuale</p>
  <div class="yearly-heat" id="yearlyHeat"></div>
  <p class="section-title">Punti per abitudine</p>
  <div class="yearly-habit-list" id="yearlyHabitList"></div>
</div>

<div class="page" id="page-goals">
  <p class="section-title" style="margin-bottom:20px">Obiettivi mensili</p>
  <div class="goals-list" id="goalsList"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" data-page="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Oggi
  </button>
  <button class="nav-btn" data-page="monthly">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Mese
  </button>
  <button class="nav-btn" data-page="yearly">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Anno
  </button>
  <button class="nav-btn" data-page="goals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    Obiettivi
  </button>
</nav>

<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="goalModalTitle"></div>
    <div class="modal-subtitle" id="goalModalSub"></div>
    <input type="number" class="goal-input" id="goalInput" min="1">
    <button class="modal-btn" id="goalSave">Salva obiettivo</button>
    <button class="modal-btn cancel" id="goalCancel">Annulla</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const HABITS = [
  { id: 'lettura', name: 'Lettura', icon: '📚', color: '#7c6fff' },
  { id: 'studio',  name: 'Studio',  icon: '🧠', color: '#4fffb0' },
  { id: 'sobrio',  name: 'Sobrio',  icon: '🧘', color: '#ff6f9c' },
  { id: 'sport',   name: 'Sport',   icon: '🏋️', color: '#ffd166' },
  { id: 'altro',   name: 'Altro',   icon: '✨', color: '#6fc8ff' },
];

// ── STORAGE ──────────────────────────────────────────────
function loadData()   { try { return JSON.parse(localStorage.getItem('ht_data_v2'))  || {}; } catch { return {}; } }
function saveData(d)  { localStorage.setItem('ht_data_v2', JSON.stringify(d)); }
function loadGoals()  { try { return JSON.parse(localStorage.getItem('ht_goals_v2')) || {}; } catch { return {}; } }
function saveGoals(g) { localStorage.setItem('ht_goals_v2', JSON.stringify(g)); }

function dateKey(d)    { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey()    { return dateKey(new Date()); }
function monthKey(y,m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function daysInMonth(y,m) { return new Date(y, m+1, 0).getDate(); }

function toggleHabit(dateK, habitId) {
  const d = loadData();
  if (!d[dateK]) d[dateK] = {};
  if (d[dateK][habitId]) delete d[dateK][habitId];
  else d[dateK][habitId] = 1;
  if (!Object.keys(d[dateK]).length) delete d[dateK];
  saveData(d);
}

function isDone(dateK, habitId)  { const d = loadData(); return !!(d[dateK] && d[dateK][habitId]); }
function getDayEntry(k)          { return loadData()[k] || {}; }
function dayDoneCount(k)         { const e = getDayEntry(k); return HABITS.filter(h => e[h.id]).length; }

function monthPoints(habitId, y, m) {
  const data = loadData(); let pts = 0;
  for (let d = 1; d <= daysInMonth(y,m); d++)
    if ((data[dateKey(new Date(y,m,d))] || {})[habitId]) pts++;
  return pts;
}

// ── STATE ─────────────────────────────────────────────────
let viewMonth = new Date().getMonth();
let viewYear  = new Date().getFullYear();
let goalEditHabit = null;

const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT   = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── HEADER ────────────────────────────────────────────────
document.getElementById('headerDate').textContent =
  new Date().toLocaleDateString('it-IT', { weekday:'short', day:'numeric', month:'short' });

// ── TODAY ─────────────────────────────────────────────────
function renderToday() {
  const h = new Date().getHours();
  document.getElementById('greetingText').innerHTML =
    `${h<12?'Buongiorno':h<18?'Buon pomeriggio':'Buonasera'}, <span>Damiano</span>`;

  const entry = getDayEntry(todayKey());
  const done  = HABITS.filter(h => entry[h.id]).length;
  const total = HABITS.length;

  document.getElementById('greetingSubtitle').textContent =
    done === 0 ? 'Nessuna abitudine completata ancora.' :
    done < total ? `${done} su ${total} abitudini completate.` :
    '🎉 Tutte le abitudini completate!';

  const circ = 2 * Math.PI * 58;
  document.getElementById('progressRing').style.strokeDashoffset = circ - (done/total)*circ;
  document.getElementById('progressPct').textContent = `${done}/${total}`;

  const data = loadData();
  const grid = document.getElementById('habitsGrid');
  grid.innerHTML = '';

  HABITS.forEach(habit => {
    const done = !!entry[habit.id];
    let streak = 0;
    let sd = new Date(); sd.setDate(sd.getDate()-1);
    for (let i = 0; i < 365; i++) {
      if ((data[dateKey(sd)] || {})[habit.id]) { streak++; sd.setDate(sd.getDate()-1); } else break;
    }
    const card = document.createElement('div');
    card.className = 'habit-card' + (done ? ' done' : '');
    card.style.setProperty('--habit-color', habit.color);
    card.innerHTML = `
      <div class="habit-icon">${habit.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${habit.name}</div>
        <div class="habit-streak">Streak: <span>${streak}</span> gg</div>
      </div>
      <div class="habit-check">
        ${done ? `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
      </div>`;
    card.addEventListener('click', () => {
      toggleHabit(todayKey(), habit.id);
      renderToday();
      showToast(isDone(todayKey(), habit.id) ? `✓ ${habit.name}` : `${habit.name} rimossa`);
    });
    grid.appendChild(card);
  });
}

// ── MONTHLY ───────────────────────────────────────────────
function renderMonthly() {
  document.getElementById('monthLabel').textContent = `${MONTHS_IT[viewMonth]} ${viewYear}`;

  // Calendar
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  DAYS_IT.forEach(d => { const el = document.createElement('div'); el.className='cal-day-header'; el.textContent=d; grid.appendChild(el); });
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const startDow = firstDow === 0 ? 6 : firstDow - 1;
  const days = daysInMonth(viewYear, viewMonth);
  const today = new Date();
  for (let i = 0; i < startDow; i++) { const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el); }
  for (let day = 1; day <= days; day++) {
    const d = new Date(viewYear, viewMonth, day);
    const cnt = dayDoneCount(dateKey(d));
    const isToday = d.toDateString() === today.toDateString();
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (cnt > 0) { cls += ' has-data'; cls += cnt === HABITS.length ? ' perfect' : ' partial'; }
    const el = document.createElement('div');
    el.className = cls;
    el.innerHTML = `${day}${cnt > 0 ? '<div class="day-dot"></div>' : ''}`;
    grid.appendChild(el);
  }

  // Stats
  const container = document.getElementById('habitMonthStats');
  container.innerHTML = '';
  HABITS.forEach(habit => {
    const pts = monthPoints(habit.id, viewYear, viewMonth);
    const pct = Math.round(pts / days * 100);
    const row = document.createElement('div');
    row.className = 'hms-row';
    row.style.setProperty('--habit-color', habit.color);
    row.innerHTML = `
      <div class="hms-top">
        <span class="hms-name">${habit.icon} ${habit.name}</span>
        <span class="hms-score">${pts} / ${days} pt</span>
      </div>
      <div class="hms-bar-bg"><div class="hms-bar-fill" style="width:${pct}%"></div></div>
      <div class="hms-meta">Completato: <span>${pct}%</span></div>`;
    container.appendChild(row);
  });
}

document.getElementById('prevMonth').addEventListener('click', () => {
  if (--viewMonth < 0) { viewMonth=11; viewYear--; } renderMonthly();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if (++viewMonth > 11) { viewMonth=0; viewYear++; } renderMonthly();
});

// ── YEARLY ────────────────────────────────────────────────
function renderYearly() {
  const year = new Date().getFullYear();
  let totalDays=0, totalPts=0, curStreak=0;
  for (let m=0; m<12; m++)
    for (let d=1; d<=daysInMonth(year,m); d++) {
      const cnt = dayDoneCount(dateKey(new Date(year,m,d)));
      if (cnt > 0) { totalDays++; totalPts+=cnt; }
    }
  let sd = new Date();
  for (let i=0; i<366; i++) {
    if (dayDoneCount(dateKey(sd)) > 0) { curStreak++; sd.setDate(sd.getDate()-1); } else break;
  }
  document.getElementById('yearlySummary').innerHTML = `
    <div class="ys-stat"><div class="val">${totalDays}</div><div class="lbl">Giorni tracciati</div></div>
    <div class="ys-stat"><div class="val">${totalPts}</div><div class="lbl">Punti totali</div></div>
    <div class="ys-stat"><div class="val">${curStreak}</div><div class="lbl">Streak attuale</div></div>
    <div class="ys-stat"><div class="val">${year}</div><div class="lbl">Anno</div></div>`;

  const heat = document.getElementById('yearlyHeat');
  heat.innerHTML = '';
  'GFMAMGLASOND'.split('').forEach((letter, m) => {
    const col = document.createElement('div'); col.className='yh-month';
    const lbl = document.createElement('div'); lbl.className='yh-month-label'; lbl.textContent=letter; col.appendChild(lbl);
    for (let d=1; d<=Math.min(daysInMonth(year,m),5); d++) {
      const cnt=dayDoneCount(dateKey(new Date(year,m,d)));
      const cell=document.createElement('div');
      const r = cnt/HABITS.length;
      cell.className = 'yh-cell' + (cnt===0?'': r>=0.8?' l4':r>=0.6?' l3':r>=0.3?' l2':' l1');
      col.appendChild(cell);
    }
    heat.appendChild(col);
  });

  const list = document.getElementById('yearlyHabitList');
  list.innerHTML = '';
  HABITS.forEach(habit => {
    let pts=0;
    for (let m=0; m<12; m++) pts+=monthPoints(habit.id,year,m);
    const row=document.createElement('div'); row.className='yhl-row'; row.style.setProperty('--habit-color',habit.color);
    row.innerHTML=`
      <div class="yhl-icon">${habit.icon}</div>
      <div class="yhl-info"><div class="yhl-name">${habit.name}</div><div class="yhl-sub">${pts} giorni completati</div></div>
      <div class="yhl-pts">${pts}<small>punti</small></div>`;
    list.appendChild(row);
  });
}

// ── GOALS ─────────────────────────────────────────────────
function renderGoals() {
  const goals=loadGoals(), now=new Date();
  const y=now.getFullYear(), m=now.getMonth();
  const mk=monthKey(y,m), maxDays=daysInMonth(y,m);
  const list=document.getElementById('goalsList');
  list.innerHTML='';
  HABITS.forEach(habit => {
    const gk=`${mk}_${habit.id}`;
    const goal=goals[gk]!==undefined ? goals[gk] : maxDays;
    const pts=monthPoints(habit.id,y,m);
    const pct=goal>0 ? Math.min(100,Math.round(pts/goal*100)) : 0;
    const card=document.createElement('div'); card.className='goal-card'; card.style.setProperty('--habit-color',habit.color);
    card.innerHTML=`
      <div class="goal-top">
        <span class="goal-icon">${habit.icon}</span>
        <span class="goal-name">${habit.name}</span>
        <button class="goal-edit-btn" data-id="${habit.id}">Modifica</button>
      </div>
      <div class="goal-progress-row">
        <span class="goal-current">${pts}</span>
        <span class="goal-target">/ ${goal} giorni</span>
      </div>
      <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
      <div class="goal-pct">${pct}% — max: ${maxDays} gg</div>`;
    card.querySelector('.goal-edit-btn').addEventListener('click', ()=>openGoalModal(habit));
    list.appendChild(card);
  });
}

function openGoalModal(habit) {
  goalEditHabit=habit;
  const now=new Date(), mk=monthKey(now.getFullYear(),now.getMonth());
  const goals=loadGoals(), maxDays=daysInMonth(now.getFullYear(),now.getMonth());
  const cur=goals[`${mk}_${habit.id}`]!==undefined ? goals[`${mk}_${habit.id}`] : maxDays;
  document.getElementById('goalModalTitle').textContent=`${habit.icon} ${habit.name}`;
  document.getElementById('goalModalSub').textContent=`Obiettivo mensile (1–${maxDays} giorni)`;
  const inp=document.getElementById('goalInput'); inp.max=maxDays; inp.value=cur;
  document.getElementById('goalModal').classList.add('open');
}
document.getElementById('goalSave').addEventListener('click', ()=>{
  const now=new Date(), maxDays=daysInMonth(now.getFullYear(),now.getMonth());
  const val=parseInt(document.getElementById('goalInput').value);
  if(isNaN(val)||val<1||val>maxDays){ showToast(`Valore tra 1 e ${maxDays}`); return; }
  const mk=monthKey(now.getFullYear(),now.getMonth()), goals=loadGoals();
  goals[`${mk}_${goalEditHabit.id}`]=val; saveGoals(goals);
  document.getElementById('goalModal').classList.remove('open');
  renderGoals(); showToast(`Obiettivo ${goalEditHabit.name}: ${val} gg`);
});
document.getElementById('goalCancel').addEventListener('click',()=>document.getElementById('goalModal').classList.remove('open'));
document.getElementById('goalModal').addEventListener('click',e=>{ if(e.target===document.getElementById('goalModal')) document.getElementById('goalModal').classList.remove('open'); });

// ── NAV ───────────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const page=btn.dataset.page;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-'+page).classList.add('active');
    if(page==='today')   renderToday();
    if(page==='monthly') renderMonthly();
    if(page==='yearly')  renderYearly();
    if(page==='goals')   renderGoals();
  });
});

renderToday();
</script>
</body>
</html>
